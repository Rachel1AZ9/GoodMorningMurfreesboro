[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googleapis.com https://www.youtube.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://challenges.cloudflare.com; connect-src 'self' https://www.googleapis.com https://script.google.com https://script.googleusercontent.com; frame-ancestors 'self'"

# Force HTTPS
[[redirects]]
  from = "http://goodmorningmurfreesboro.com/*"
  to = "https://goodmorningmurfreesboro.com/:splat"
  status = 301
  force = true

# www redirect
[[redirects]]
  from = "https://www.goodmorningmurfreesboro.com/*"
  to = "https://goodmorningmurfreesboro.com/:splat"
  status = 301
  force = true
